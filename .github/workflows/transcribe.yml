on:
  workflow_dispatch:
    inputs:
      model_size:
        description: 'Whisper model size'
        default: 'medium'
        required: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - run: |
        sudo apt update
        sudo apt install -y ffmpeg
        pip install -U openai-whisper

    - name: Use latest uploaded MP3 from audio/
      run: |
        file=$(ls -t audio/*.mp3 | head -n 1)
        cp "$file" input_audio.mp3
        echo "Using $file"
        python app.py input_audio.mp3 --model ${{ github.event.inputs.model_size }}

    - uses: actions/upload-artifact@v4
      with:
        name: transcript
        path: transcript.txt