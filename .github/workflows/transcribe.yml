name: Test Whisper Transcription

on:
  workflow_dispatch:
    inputs:
      model_size:
        description: 'Model size (tiny, base, small, medium, large)'
        default: 'medium'
        required: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y ffmpeg
        pip install openai-whisper
        
    - name: Upload audio file
      uses: actions/upload-artifact@v4
      with:
        name: input-audio
        path: input_audio.mp3
        
    - name: Download audio file
      uses: actions/download-artifact@v4
      with:
        name: input-audio
        path: .
        
    - name: Run transcription
      run: |
        python app.py input_audio.mp3 --model ${{ github.event.inputs.model_size }}
        
    - name: Upload transcript
      uses: actions/upload-artifact@v4
      with:
        name: transcript
        path: transcript.txt