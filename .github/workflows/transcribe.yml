name: Transcribe Audio

on:
  workflow_dispatch:
    inputs:
      model_size:
        description: 'Whisper model size'
        default: 'medium'
        required: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y ffmpeg
        pip install -U openai-whisper

    - name: Download uploaded audio artifact
      uses: actions/download-artifact@v4
      with:
        name: audio
        path: .

    - name: Find MP3 file
      run: |
        file=$(find . -name "*.mp3" | head -n 1)
        echo "Found audio: $file"
        cp "$file" input_audio.mp3

    - name: Transcribe
      run: |
        python app.py input_audio.mp3 --model ${{ github.event.inputs.model_size }}

    - name: Upload transcript
      uses: actions/upload-artifact@v4
      with:
        name: transcript
        path: transcript.txt