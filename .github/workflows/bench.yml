name: Run Whisper Transcription

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'URL of the audio file to transcribe'
        required: true
      model_size:
        description: 'Model size (tiny, base, small, medium, large)'
        default: 'medium'
        required: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openai-whisper
        sudo apt-get install ffmpeg
        
    - name: Download audio file
      run: |
        wget ${{ github.event.inputs.audio_url }} -O input_audio.mp3
        
    - name: Run transcription
      run: |
        python app.py input_audio.mp3 --model ${{ github.event.inputs.model_size }}
        
    - name: Upload transcript
      uses: actions/upload-artifact@v3
      with:
        name: transcript
        path: transcript.txt
